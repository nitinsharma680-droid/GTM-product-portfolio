function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

}

function card(content,extraStyle=''){

}

        <span style="font-size:18px">${link.icon}</span>
        <span>${link.label}</span>
        <span style="margin-left:auto;color:${p.color};font-size:12px">→</span>
      </a>`).join('')}`)}
    ${card(`<div style="color:${p.color};font-size:11px;font-family:monospace;margin-bottom:16px">🏅 CERTIFICATIONS & COMPLIANCE</div>
      ${p.certifications.map(cert=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:${p.color}10;border:1px solid ${p.color}25;margin-bottom:8px">
        <span style="color:${p.color};font-size:16px">🛡</span>
        <span style="color:#CCC;font-size:13px">${cert}</span>
      </div>`).join('')}`)}
  </div>
  ${card(`<div style="color:${p.color};font-size:11px;font-family:monospace;margin-bottom:12px">📋 SUBSCRIPTION / LICENSING MODELS</div>
    <div class="grid4">
      ${[
        {type:"SaaS Subscription",detail:"Monthly/Annual recurring revenue — primary monetization"},
        {type:"Usage-Based",detail:"Per-transaction, per-API-call pricing for volume players"},
        {type:"Enterprise License",detail:"Multi-year committed contracts with SLA guarantees"},
        {type:"Freemium",detail:"Free tier drives consumer adoption → upsell to premium"}
      ].map(m=>`<div style="padding:12px;border-radius:6px;background:#1A2035">
        <div style="color:#FFF;font-size:13px;margin-bottom:6px">${m.type}</div>
        <div style="color:#888;font-size:12px;line-height:1.5">${m.detail}</div>
      </div>`).join('')}
    </div>`,'border-left:3px solid '+p.color)}`;
}

function renderPhase(p, phase){
  switch(phase){
    case 'Overview': return renderOverview(p);
    case 'Personas': return renderPersonas(p);
    case 'Discovery': return renderDiscovery(p);
    case 'Requirements': return renderRequirements(p);
    case 'Prioritization': return renderPrioritization(p);
    case 'Milestones': return renderMilestones(p);
    case 'Competitive': return renderCompetitive(p);
    case 'Pricing': return renderPricing(p);
    case 'GTM Strategy': return renderGTM(p);
    case 'Challenges': return renderChallenges(p);
    case 'Resources': return renderResources(p);
    default: return '';
  }
}

function render(){
  const p = PRODUCTS[activeProduct];

  // Product tabs
  document.getElementById('productTabs').innerHTML = PRODUCTS.map((prod,i)=>`
    <button class="prod-tab" onclick="selectProduct(${i})"
      style="background:${i===activeProduct?prod.color:'#1A1F35'};color:${i===activeProduct?'#000':'#AAA'};font-weight:${i===activeProduct?'bold':'normal'}">
      ${prod.icon} ${prod.name}
      <span style="margin-left:8px;font-size:10px;padding:2px 6px;border-radius:10px;background:${i===activeProduct?'rgba(0,0,0,0.2)':'#2A3050'};color:${i===activeProduct?'#000':'#666'}">${prod.industry}</span>
    </button>`).join('');

  // Phase nav
  document.getElementById('phaseNav').innerHTML = PHASES.map(ph=>`
    <button class="phase-btn" onclick="selectPhase('${ph}')"
      style="color:${activePhase===ph?p.color:'#666'};border-bottom-color:${activePhase===ph?p.color:'transparent'}">
      ${ph}
    </button>`).join('');

  // Content
  document.getElementById('mainContent').innerHTML = renderPhase(p, activePhase);
}

function selectProduct(i){
  activeProduct = i;
  activePhase = 'Overview';
  render();
  window.scrollTo(0,0);
}

function selectPhase(ph){
  activePhase = ph;
  render();
  window.scrollTo({top:120,behavior:'smooth'});
}

render();
</script>
</body>
</html>
